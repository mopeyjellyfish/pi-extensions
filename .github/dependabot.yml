version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    groups:
      eslint:
        patterns:
          - "@eslint/*"
          - "@eslint-community/*"
          - "eslint*"
          - "typescript-eslint"
      vitest:
        patterns:
          - "@vitest/*"
          - "vitest"

  - package-ecosystem: gomod
    directories:
      - "/packages/*/go"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
