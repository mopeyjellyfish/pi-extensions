version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  default: standard
  enable:
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - containedctx
    - contextcheck
    - copyloopvar
    - cyclop
    - durationcheck
    - dupword
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - exptostd
    - fatcontext
    - forcetypeassert
    - gocheckcompilerdirectives
    - gochecksumtype
    - gocognit
    - gocritic
    - gosec
    - interfacebloat
    - makezero
    - maintidx
    - misspell
    - modernize
    - musttag
    - nilerr
    - nilnesserr
    - nilnil
    - noctx
    - nolintlint
    - perfsprint
    - predeclared
    - reassign
    - recvcheck
    - rowserrcheck
    - sqlclosecheck
    - unconvert
    - usestdlibvars
    - wastedassign
    - whitespace
  settings:
    cyclop:
      max-complexity: 15
    gocognit:
      min-complexity: 20
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
    govet:
      enable:
        - nilness
        - shadow
    interfacebloat:
      max: 10
    maintidx:
      under: 20
    nolintlint:
      require-explanation: true
      require-specific: true
  exclusions:
    generated: strict
    warn-unused: true

formatters:
  enable:
    - gofumpt
    - goimports
  exclusions:
    generated: strict
    warn-unused: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  fix: false
